{% extends 'employees/employee_base.html' %}

{% block content %}

<h1 class="mb-4">
    My Attendance
</h1>

<table class="table table-bordered">

    <thead>

        <tr>

            <th>Date</th>

            <th>Status</th>

        </tr>

    </thead>

    <tbody>

        {% for attendance in attendance_records %}

        <tr>

            <td>{{ attendance.date }}</td>

            <td>{{ attendance.status }}</td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
