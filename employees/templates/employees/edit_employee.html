<!DOCTYPE html>
<html lang="">

<head>

    <title>Edit Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h2 class="mb-4">
            Edit Employee
        </h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                    class="btn btn-warning">

                Update Employee

            </button>

            <a href="/employees/"
               class="btn btn-secondary">

                Back

            </a>

        </form>

    </div>

</div>

</body>

</html>
