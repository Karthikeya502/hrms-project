<!DOCTYPE html>
<html>

<head>

    <title>HRMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            margin: 0;
            padding: 0;
        }

        .sidebar {
            height: 100vh;
            background-color: #343a40;
            padding-top: 20px;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 12px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #495057;
        }

    </style>

<body>

<div class="container-fluid">

    <div class="row g-0">

        <div class="col-2 sidebar">

            <h3 class="text-white text-center">
                HRMS
            </h3>

            <a href="/employees/dashboard/">
                Dashboard
            </a>

            <a href="/employees/">
                Employees
            </a>

            <a href="/employees/attendance/">
                Attendance
            </a>

            <a href="/employees/leave/">
                Leave Management
            </a>

            <a href="/employees/logout/">
                Logout
            </a>

        </div>

        <div class="col-10 p-4">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</div>

</body>

</html>
