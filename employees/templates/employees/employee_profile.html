{% extends 'employees/employee_base.html' %}

{% block content %}

<h1 class="mb-4">
    My Profile
</h1>

<div class="card shadow p-4">

    <table class="table">

        <tr>
            <th>Name</th>
            <td>{{ employee.name }}</td>
        </tr>

        <tr>
            <th>Email</th>
            <td>{{ employee.email }}</td>
        </tr>

        <tr>
            <th>Department</th>
            <td>{{ employee.department }}</td>
        </tr>

        <tr>
            <th>Designation</th>
            <td>{{ employee.designation }}</td>
        </tr>

        <tr>
            <th>Phone</th>
            <td>{{ employee.phone }}</td>
        </tr>

        <tr>
            <th>Joining Date</th>
            <td>{{ employee.joining_date }}</td>
        </tr>

    </table>

</div>

{% endblock %}
