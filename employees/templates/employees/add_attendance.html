{% extends 'employees/base.html' %}
{% block content %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">




<div class="container mt-5">

    <div class="card p-4 shadow">

        <h2 class="mb-4">
            Add Attendance
        </h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                    class="btn btn-success">

                Save Attendance

            </button>

        </form>

    </div>

</div>


{% endblock %}
