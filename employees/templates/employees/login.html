<!DOCTYPE html>
<html lang="">

<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card p-4 shadow">

                <h2 class="mb-4 text-center">
                    HRMS Login
                </h2>
                 {% if error %}

<div class="alert alert-danger">

    {{ error }}

</div>

{% endif %}
                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label>
                            Username
                        </label>

                        <label>
                            <input type="text"
                                   name="username"
                                   class="form-control">
                        </label>

                    </div>

                    <div class="mb-3">

                        <label>
                            Password
                        </label>

                        <label>
                            <input type="password"
                                   name="password"
                                   class="form-control">
                        </label>

                    </div>

                    <button type="submit"
                            class="btn btn-primary w-100">

                        Login

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
