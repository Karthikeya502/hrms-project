<!DOCTYPE html>
<html lang="">

<head>

    <title>Employee Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            margin: 0;
            padding: 0;
        }

        .sidebar {
            height: 100vh;
            background-color: #198754;
            padding-top: 20px;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 12px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #157347;
        }

    </style>

</head>

<body>

<div class="container-fluid">

    <div class="row g-0">

        <div class="col-2 sidebar">

            <h3 class="text-white text-center">
                Employee Portal
            </h3>

            <a href="/employees/employee/dashboard/">
                Dashboard
            </a>

            <a href="/employees/leave/add/">
                Apply Leave
            </a>

            <a href="/employees/employee/leave/">
                My Leaves
            </a>

            <a href="/employees/employee/attendance/">
                My Attendance
            </a>
             <a href="/employees/employee/profile/">
                   My Profile
             </a>

            <a href="/employees/logout/">
                Logout
            </a>

        </div>

        <div class="col-10 p-4">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</div>

</body>

</html>
