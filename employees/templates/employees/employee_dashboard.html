{% extends 'employees/employee_base.html' %}

{% block content %}

<h1 class="mb-4">
    Employee Dashboard
</h1>

<h4 class="mb-4">
    Welcome, {{ employee.name }}
</h4>

<div class="row">

    <div class="col-md-3">

        <div class="card shadow p-3 text-center">

            <h5>Total Leaves</h5>

            <h1>{{ total_leaves }}</h1>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card shadow p-3 text-center">

            <h5>Pending Leaves</h5>

            <h1>{{ pending_leaves }}</h1>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card shadow p-3 text-center">

            <h5>Approved Leaves</h5>

            <h1>{{ approved_leaves }}</h1>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card shadow p-3 text-center">

            <h5>Attendance Records</h5>

            <h1>{{ attendance_count }}</h1>

        </div>

    </div>

</div>

<div class="mt-5">

    <a href="/employees/leave/add/"
       class="btn btn-primary">

        Apply Leave

    </a>

</div>

{% endblock %}
